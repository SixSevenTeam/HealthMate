services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: healthmate-backend
    env_file:
      - ./.env
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./dataset:/app/dataset:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - healthmate-network

  postgres:
    image: postgres:17-alpine
    container_name: healthmate-postgres
    env_file:
      - ./.env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - healthmate-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-healthmate_user} -d ${POSTGRES_DB:-HealthMate_DB}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  healthmate-network:
    driver: bridge

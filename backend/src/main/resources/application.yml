spring:
  config:
    import: optional:file:.env[.properties],optional:file:backend/.env[.properties]
  application:
    name: healthmate-backend
  profiles:
    active: dev

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/HealthMate_DB}
    username: ${DB_USERNAME:healthmate_user}
    password: ${DB_PASSWORD:healthmate_user}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

  web:
    cors:
      allowed-origins: ${FRONTEND_URL:http://localhost:5173}
      allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
      allowed-headers: "*"
      allow-credentials: true
      max-age: 3600

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /healthmate
  compression:
    enabled: true
    min-response-size: 1024

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:healthmate_jwt_secret_key_change_in_production_very_secure_key}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cookie-name: jwt

auth:
  cookie-secure: ${AUTH_COOKIE_SECURE:false}
  cookie-same-site: ${AUTH_COOKIE_SAME_SITE:Strict}

# AES Encryption
aes:
  secret-key: ${AES_SECRET_KEY:healthmate_aes_secret_key_change_in_prod_32chars}

# Python Service
python:
  service-url: ${PYTHON_SERVICE_URL:http://localhost:8001}
  internal-api-key: ${PYTHON_INTERNAL_API_KEY:healthmate_internal_api_key}
  request-timeout-ms: 30000
  retry-count: 2
  retry-delay-ms: 2000

healthmate:
  dataset-root: ${HEALTHMATE_DATASET_ROOT:dataset/healthmate_2018-2023/data}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

# Logging
logging:
  level:
    root: INFO
    com.healthmate: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/healthmate.log
    max-size: 10MB
    max-history: 10
